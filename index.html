<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎂</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    overflow: hidden;
    background: linear-gradient(-45deg, #ff4d8d, #6a5cff, #00d4ff, #ffcc00);
    background-size: 400% 400%;
    animation: gradient 10s ease infinite;
}

@keyframes gradient {
    0% {background-position:0% 50%}
    50% {background-position:100% 50%}
    100% {background-position:0% 50%}
}

.card {
    text-align: center;
    background: rgba(255,255,255,0.1);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(12px);
    color: white;
    box-shadow: 0 0 30px rgba(0,0,0,0.3);
    width: 90%;
    max-width: 500px;
}

h1 {
    font-size: 2.5rem;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 16px;
    margin-top: 15px;
}

.gift {
    font-size: 60px;
    cursor: pointer;
    transition: transform 0.3s;
}

.gift:hover {
    transform: scale(1.2);
}

.message {
    margin-top: 20px;
    font-size: 18px;
    min-height: 40px;
}
</style>
</head>

<body>

<div class="card">
    <div class="gift" onclick="openGift()">🎁</div>
    <h1>Happy Birthday 🎂</h1>

    <div class="message" id="text"></div>
</div>

<script>
const message = "Happy Birthday Auni 🎉 Hope your day is full of happiness, laughter, and beautiful memories 💖";

let i = 0;

function typeText(){
    if(i < message.length){
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeText, 50);
    }
}

function openGift(){
    confetti({
        particleCount: 250,
        spread: 120,
        origin: { y: 0.6 }
    });

    document.getElementById("text").innerHTML = "";
    i = 0;
    typeText();
}
</script>

</body>
</html>
